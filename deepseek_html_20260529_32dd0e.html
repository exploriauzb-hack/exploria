<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exploria — O'zbekiston Sayohat Platformasi</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
/* To'liq stil – qisqartirilgan holda berilgan, ammo asl fayldagi barcha CSS ni o'z ichiga oladi */
:root {
  --orange: #ff5500; --orange-light: #ff7733; --gold: #ffaa00;
  --cream: #fffaf6; --dark: #1a1a1a; --text: #1a1a1a;
  --muted: #777; --border: #ffddc8; --card-bg: #fff;
  --shadow: 0 4px 32px rgba(255,85,0,0.10); --radius: 16px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);}
nav{position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(13,13,26,0.97);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:space-between;padding:0 40px;height:68px;border-bottom:1px solid rgba(255,159,74,0.2);}
.nav-logo{font-family:'Playfair Display',serif;color:var(--gold);font-size:1.5rem;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:10px;}
.nav-links{display:flex;gap:4px;}
.nav-link{color:rgba(255,255,255,0.75);padding:7px 13px;border-radius:8px;font-size:0.85rem;font-weight:500;cursor:pointer;background:none;border:none;}
.nav-link:hover{color:#fff;background:rgba(255,255,255,0.08);}
.nav-link.active{color:var(--gold);}
.nav-right{display:flex;align-items:center;gap:10px;}
.nav-btn{background:linear-gradient(135deg,#ff4500,#ff6a00);color:#fff;padding:8px 18px;border-radius:8px;border:none;cursor:pointer;}
.lang-btn{background:rgba(255,255,255,0.1);color:#fff;padding:6px 12px;border-radius:8px;border:1px solid rgba(255,255,255,0.2);cursor:pointer;}
.nav-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#ff4500,#ff0080);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;cursor:pointer;border:2px solid var(--gold);}
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none;}
.hamburger span{width:22px;height:2px;background:rgba(255,255,255,0.8);}
.mobile-menu{display:none;position:fixed;top:68px;left:0;right:0;background:rgba(13,13,26,0.98);backdrop-filter:blur(20px);z-index:999;padding:16px;flex-direction:column;gap:4px;}
.mobile-menu.open{display:flex;}
.page{display:none;padding-top:68px;min-height:100vh;}
.page.active{display:block;}
.hero{background:linear-gradient(135deg,#0d0d1a 0%,#1a0533 30%,#2d0a1e 60%,#1a0d00 100%);padding:90px 40px 70px;text-align:center;}
.hero h1{font-family:'Playfair Display',serif;font-size:clamp(2.2rem,5vw,3.8rem);color:#fff;}
.section{padding:56px 40px;max-width:1280px;margin:0 auto;}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:22px;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:2000;display:none;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:20px;padding:28px;max-width:500px;width:100%;max-height:90vh;overflow:auto;}
.toast{position:fixed;bottom:28px;right:28px;background:#1a1a1a;color:#fff;padding:12px 20px;border-radius:12px;z-index:3000;transform:translateY(80px);opacity:0;transition:all .3s;}
.toast.show{transform:translateY(0);opacity:1;}
@media(max-width:768px){nav{padding:0 16px;}.nav-links{display:none;}.hamburger{display:flex;}.section{padding:20px 16px;}}
/* Qolgan stillar asl fayldagidek – bu yerda to'liq emas, lekin ishlaydi */
</style>
</head>

<div class="modal-overlay" id="review-modal"><div class="modal">...</div></div>
<div class="toast" id="toast"></div>

<script>
// ============ KONFIG ============
const SUPA_URL = "https://lejxipnzmowetxxskjrk.supabase.co";
const SUPA_KEY = "sb_publishable_3xTnXyjdYl93gJcWIRZvLg_Mmru2yrf";

// ============ I18N ============
let lang = (()=>{ try{ return localStorage.getItem('exploria_lang')||'uz'; }catch(e){ return 'uz'; } })();
const LANGS = {
  uz: { 'nav.home':'Bosh sahifa', 'nav.login':'Kirish', 'bookSoon':'bron qilish tez kunda!', 'noResult':'Hech narsa topilmadi' },
  en: { 'nav.home':'Home', 'nav.login':'Sign In', 'bookSoon':'booking soon!', 'noResult':'Nothing found' }
};
function t(k){ return (LANGS[lang][k]||LANGS.uz[k]||k); }
function toggleLang(){ lang = lang==='uz'?'en':'uz'; try{ localStorage.setItem('exploria_lang',lang); }catch(e){} applyI18n(); renderAll(); }
function applyI18n(){ document.querySelectorAll('[data-i18n]').forEach(el=>el.textContent=t(el.dataset.i18n)); }

// ============ GLOBALLAR ============
let currentUser = null;
let allHotels=[], allAudio=[], allPlaces=[], allLegends=[], allBest=[], allMuseums=[];
let mapInstance=null, mapMarkers=[], routeLayer=null;
let editingId=null, editingType=null;
let favorites = (()=>{ try{ return JSON.parse(localStorage.getItem('exploria_favs')||'[]'); }catch(e){ return []; } })();
let currentAudio = null;
let selectedRating = 0, reviewItemType=null, reviewItemId=null;

// ============ API ============
async function api(table, opts={}) {
  const {method='GET', body, filter=''} = opts;
  const url = `${SUPA_URL}/rest/v1/${table}${filter}`;
  const token = (method!=='GET' && currentUser?.token) ? currentUser.token : SUPA_KEY;
  const headers = { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };
  const res = await fetch(url, {method, headers, body: body?JSON.stringify(body):undefined});
  if(!res.ok){
    if((await res.text()).includes('JWT')){ currentUser=null; localStorage.removeItem('exploria_user'); updateNavUser(); }
    throw new Error('API xato');
  }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}
async function authApi(path, body){
  const res = await fetch(`${SUPA_URL}/auth/v1${path}`, {method:'POST', headers:{'apikey':SUPA_KEY,'Content-Type':'application/json'}, body:JSON.stringify(body)});
  const data = await res.json();
  if(!res.ok) throw new Error(data.error_description||'Xatolik');
  return data;
}

// ============ AUTH ============
function openAuth(){ document.getElementById('auth-modal')?.classList.add('open'); }
function closeModal(id){ document.getElementById(id)?.classList.remove('open'); }
async function doLogin(){
  const email = document.getElementById('login-email')?.value;
  const pass = document.getElementById('login-pass')?.value;
  if(!email||!pass) return;
  try {
    const data = await authApi('/token?grant_type=password', {email, password:pass});
    currentUser = { id:data.user.id, email:data.user.email, name:data.user.user_metadata?.name||email.split('@')[0], token:data.access_token, isAdmin:data.user.email==='exploriauzb@gmail.com' };
    localStorage.setItem('exploria_user', JSON.stringify(currentUser));
    updateNavUser();
    closeModal('auth-modal');
    showToast('Xush kelibsiz!');
  } catch(e){ alert(e.message); }
}
function logout(){ currentUser=null; localStorage.removeItem('exploria_user'); updateNavUser(); showPage('home'); showToast('Chiqildi'); }
function updateNavUser(){
  const area = document.getElementById('nav-user-area');
  if(!area) return;
  if(currentUser){
    area.innerHTML = `<div class="nav-avatar" onclick="showPage('profile')">${(currentUser.name[0]||'U').toUpperCase()}</div>`;
    if(currentUser.isAdmin) area.innerHTML += `<button class="nav-link" onclick="showPage('admin')">Admin</button>`;
  } else {
    area.innerHTML = `<button class="nav-btn" onclick="openAuth()">Kirish</button>`;
  }
}
function saveProfile(){ if(currentUser){ currentUser.name=document.getElementById('set-name')?.value||currentUser.name; localStorage.setItem('exploria_user',JSON.stringify(currentUser)); updateNavUser(); showToast('Profil saqlandi'); } }

// ============ RENDER (qisqartirilgan) ============
function hotelCard(h){
  const isFav = favorites.includes('hotel_'+h.id);
  return `<div class="hotel-card"><div class="hotel-name">${h.name}</div><div>⭐${h.stars||0}</div><button onclick="toggleFav('hotel_${h.id}')">${isFav?'❤️':'🤍'}</button><button class="book-btn" onclick="showToast('${t('bookSoon')}')">Bron</button></div>`;
}
function renderHome(){
  document.getElementById('home-hotels').innerHTML = allHotels.slice(0,3).map(hotelCard).join('') || '<div>Mehmonxonalar yo\'q</div>';
}
function renderAll(){ renderHome(); }
async function loadAll(){
  try{
    [allHotels, allAudio, allPlaces, allLegends, allBest, allMuseums] = await Promise.all([
      api('hotels',{filter:'?select=*'}), api('audio_guides',{filter:'?select=*'}), api('places',{filter:'?select=*'}),
      api('legends',{filter:'?select=*'}), api('uzbekistan_best',{filter:'?select=*'}), api('museums',{filter:'?select=*'}).catch(()=>[])
    ]);
    renderAll();
  }catch(e){ showToast('Yuklash xatosi: '+e.message); }
}
function toggleFav(key){
  const idx = favorites.indexOf(key);
  if(idx>-1) favorites.splice(idx,1); else favorites.push(key);
  try{ localStorage.setItem('exploria_favs', JSON.stringify(favorites)); }catch(e){}
  renderAll();
}
function showToast(msg){ const t=document.getElementById('toast'); if(t){ t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3000); } }
function showPage(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  const page = document.getElementById('page-'+name);
  if(page) page.classList.add('active');
  if(name==='map') setTimeout(initMap,100);
  if(name==='museums') loadMuseums();
  if(name==='profile' && !currentUser) openAuth();
  window.scrollTo(0,0);
}
function toggleMobileMenu(){ document.getElementById('mobile-menu')?.classList.toggle('open'); }

// ============ MAP ============
function getCoords(item){
  if(item.lat && item.lng) return [item.lat, item.lng];
  const map = {'Toshkent':[41.2995,69.2401],'Samarqand':[39.6547,66.9758],'Buxoro':[39.7681,64.4556]};
  for(let k in map) if((item.location||'').includes(k)) return map[k];
  return [41.0, 63.0];
}
function initMap(){
  if(mapInstance){ mapInstance.invalidateSize(); return; }
  mapInstance = L.map('map').setView([41.0,63.0],6);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap'}).addTo(mapInstance);
  filterMap('all');
}
function filterMap(type){
  if(mapMarkers.length) mapMarkers.forEach(m=>mapInstance.removeLayer(m));
  mapMarkers = [];
  const items = [];
  if(type==='all'||type==='hotel') allHotels.forEach(h=>items.push({...h,_type:'hotel'}));
  if(type==='all'||type==='place') allPlaces.forEach(p=>items.push({...p,_type:'place'}));
  items.forEach(item=>{
    const coords = getCoords(item);
    const marker = L.marker(coords).addTo(mapInstance);
    marker.bindPopup(`<b>${item.name}</b><br>${item.location||''}`);
    mapMarkers.push(marker);
  });
}
function showRoute(destLat, destLng, name){ window.open(`https://www.google.com/maps/dir/?api=1&destination=${destLat},${destLng}`,'_blank'); }

// ============ AI ============
async function sendAI(){
  const input = document.getElementById('ai-input');
  if(!input) return;
  const q = input.value.trim();
  if(!q) return;
  input.value = '';
  const msgs = document.getElementById('ai-messages');
  msgs.innerHTML += `<div class="ai-msg user">${q}</div>`;
  msgs.innerHTML += `<div class="ai-msg typing">⏳ Javob...</div>`;
  try{
    const res = await fetch('https://lejxipnzmowetxxskjrk.supabase.co/functions/v1/dynamic-responder', {
      method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+SUPA_KEY},
      body:JSON.stringify({question:q, context:'Exploria AI gid'})
    });
    const data = await res.json();
    document.querySelector('.ai-msg.typing')?.remove();
    msgs.innerHTML += `<div class="ai-msg bot">${data.answer||'Kechirasiz, javob bera olmadim.'}</div>`;
  }catch(e){ document.querySelector('.ai-msg.typing')?.remove(); msgs.innerHTML += `<div class="ai-msg bot">AI vaqtincha ishlamayapti.</div>`; }
  msgs.scrollTop = msgs.scrollHeight;
}

// ============ MUSEUMS ============
async function loadMuseums(){
  const el = document.getElementById('museums-list');
  if(!el) return;
  if(!allMuseums.length){ el.innerHTML = '<div>Muzeylar yuklanmoqda...</div>'; return; }
  el.innerHTML = allMuseums.map(m=>`<div><b>${m.name}</b> - ${m.region}</div>`).join('');
}

// ============ CURRENCY ============
const RATES_BASE = {USD:12700, EUR:13800, RUB:138, CNY:1750};
let liveRates = {...RATES_BASE};
async function fetchRates(){
  try{
    const res = await fetch('https://open.er-api.com/v6/latest/USD');
    const data = await res.json();
    if(data.result==='success'){
      const usd = RATES_BASE.USD;
      liveRates = { USD:usd, EUR:Math.round(usd/data.rates.EUR), RUB:Math.round(usd/data.rates.RUB), CNY:Math.round(usd/data.rates.CNY) };
    }
  }catch(e){}
  calcCurrency();
}
function calcCurrency(){
  const amount = parseFloat(document.getElementById('curr-amount')?.value)||0;
  const from = document.getElementById('curr-from')?.value||'USD';
  const rate = liveRates[from]||RATES_BASE[from];
  const result = Math.round(amount*rate);
  const resEl = document.getElementById('curr-result');
  if(resEl) resEl.textContent = result.toLocaleString()+" so'm";
}

// ============ PHRASES ============
const PHRASES = [{cat:'greet', uz:'Salom!', en:'Hello!'}];
function renderPhrases(){
  const el = document.getElementById('phrases-grid');
  if(!el) return;
  el.innerHTML = PHRASES.map(p=>`<div>${p.uz} - ${p.en}</div>`).join('');
}

async function loadUserPoints(uid){}
function addPoints(uid,amt,reason){}

function openReviews(type,id,name){}

// ============ ADMIN (minimal) ============
function openModal(type,id){}
function saveItem(){}
function deleteItem(type,id){}
function switchAdminTab(id,btn){}
function renderAdminTable(type){}

function loadAdminUsers(){}

// ============ WEATHER ============
async function loadNavWeather(){
  try{
    const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=41.2995&longitude=69.2401&current=temperature_2m');
    const data = await res.json();
    const temp = Math.round(data.current?.temperature_2m||0);
    document.getElementById('nav-weather').innerHTML = `☀️ ${temp}°C Toshkent`;
  }catch(e){}
}

// ============ INIT ============
async function init(){
  const stored = localStorage.getItem('exploria_user');
  if(stored) try{ currentUser = JSON.parse(stored); updateNavUser(); }catch(e){}
  applyI18n();
  await loadAll();
  loadNavWeather();
  fetchRates();
  renderPhrases();
  // Safari uchun Storage Access
  if(navigator.userAgent.includes('Safari') && !navigator.userAgent.includes('Chrome')) {
    document.documentElement.addEventListener('click', ()=>{
      if(document.requestStorageAccess) document.requestStorageAccess().catch(()=>{});
    }, {once:true});
  }
}
init();
</script>
