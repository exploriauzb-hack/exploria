<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exploria O'zbekiston</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: #f0f4f8; color: #1a2a3a; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { font-size: 2.5rem; text-align: center; margin-bottom: 10px; color: #2c5f2d; }
        .sub { text-align: center; margin-bottom: 40px; color: #4a627a; }
        .section { margin-bottom: 50px; }
        .section h2 { font-size: 1.8rem; border-left: 6px solid #2c5f2d; padding-left: 15px; margin-bottom: 20px; color: #1e3a2f; }
        .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; }
        .card { background: white; border-radius: 24px; padding: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); transition: 0.2s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 12px 28px rgba(0,0,0,0.1); }
        .card-header { font-size: 2rem; margin-bottom: 12px; }
        .card-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 8px; }
        .detail { color: #4a5568; margin: 8px 0; font-size: 0.9rem; }
        .badge { display: inline-block; background: #e9f5e9; color: #2c5f2d; padding: 4px 12px; border-radius: 50px; font-size: 0.75rem; font-weight: 600; margin-top: 10px; }
        .price { font-weight: 800; color: #d97706; font-size: 1.2rem; }
        footer { text-align: center; margin-top: 50px; color: #7f8c8d; font-size: 0.8rem; }
        @media (max-width: 640px) { body { padding: 16px; } h1 { font-size: 1.8rem; } }
    </style>
</head>
<body>
<div class="container">
    <h1>🏔️ Exploria O'zbekiston</h1>
    <div class="sub">Sayohatingizni boshlang — audio gidlar, mehmonxonalar, noyob joylar</div>

    <div class="section">
        <h2>🏨 Mehmonxonalar</h2>
        <div id="hotels-container" class="cards">⏳ Yuklanmoqda...</div>
    </div>

    <div class="section">
        <h2>🎧 Audio gidlar</h2>
        <div id="audio-container" class="cards">⏳ Yuklanmoqda...</div>
    </div>

    <div class="section">
        <h2>📍 Diqqatga sazovor joylar</h2>
        <div id="places-container" class="cards">⏳ Yuklanmoqda...</div>
    </div>
    <footer>Ma'lumotlar bevosita bazadan olinadi | Exploria startap</footer>
</div>

<script>
    const SUPABASE_URL = "https://lejxipnzmowetxxskjrk.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_3xTnXyjdYl93gJcWIRZvLg_Mmru2yrf";

    async function fetchData(table) {
        const url = `${SUPABASE_URL}/rest/v1/${table}?select=*`;
        const res = await fetch(url, {
            headers: {
                "apikey": SUPABASE_ANON_KEY,
                "Authorization": `Bearer ${SUPABASE_ANON_KEY}`
            }
        });
        if (!res.ok) throw new Error(`${table}: ${res.status}`);
        return res.json();
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function renderHotels(hotels) {
        const container = document.getElementById('hotels-container');
        if (!hotels.length) { container.innerHTML = '<div class="card">Mehmonxona yo\'q</div>'; return; }
        container.innerHTML = hotels.map(h => `
            <div class="card">
                <div class="card-header">${h.emoji || '🏨'}</div>
                <div class="card-title">${escapeHtml(h.name)}</div>
                <div class="detail">📍 ${escapeHtml(h.location)}</div>
                <div class="detail">⭐ ${h.stars} ★ | ${h.price} USD</div>
                <div class="detail">🎁 ${h.badge || 'Standart'}</div>
                <div class="detail">🛜 ${h.amenities ? h.amenities.join(', ') : '-'}</div>
                ${h.price ? `<div class="price">${h.price} $</div>` : ''}
            </div>
        `).join('');
    }

    function renderAudioGuides(guides) {
        const container = document.getElementById('audio-container');
        if (!guides.length) { container.innerHTML = '<div class="card">Audio gid yo\'q</div>'; return; }
        container.innerHTML = guides.map(g => `
            <div class="card">
                <div class="card-header">${g.emoji || '🎧'}</div>
                <div class="card-title">${escapeHtml(g.title)}</div>
                <div class="detail">📂 ${escapeHtml(g.category)}</div>
                <div class="detail">📍 ${escapeHtml(g.location)}</div>
                <div class="detail">⏱️ ${g.duration || '—'}</div>
                <span class="badge">Audio guide</span>
            </div>
        `).join('');
    }

    function renderPlaces(places) {
        const container = document.getElementById('places-container');
        if (!places.length) { container.innerHTML = '<div class="card">Joylar yo\'q</div>'; return; }
        container.innerHTML = places.map(p => `
            <div class="card">
                <div class="card-header">${p.emoji || '📍'}</div>
                <div class="card-title">${escapeHtml(p.name)}</div>
                <div class="detail">🏷️ ${escapeHtml(p.category)}</div>
                <div class="detail">📍 ${escapeHtml(p.location)}</div>
                <div class="detail">⭐ Reyting: ${p.rating || '—'}</div>
                ${p.is_hidden ? '<span class="badge">✨ Yashirin</span></div>' : ''}
            </div>
        `).join('');
    }

    async function loadAllData() {
        try {
            const [hotels, guides, places] = await Promise.all([
                fetchData('hotels'),
                fetchData('audio_guides'),
                fetchData('places')
            ]);
            renderHotels(hotels);
            renderAudioGuides(guides);
            renderPlaces(places);
        } catch (err) {
            console.error(err);
            document.getElementById('hotels-container').innerHTML = `<div class="card">❌ Xatolik: ${err.message}<br>URL yoki kalitni tekshiring</div>`;
            document.getElementById('audio-container').innerHTML = '<div class="card">❌ Yuklab bo\'lmadi</div>';
            document.getElementById('places-container').innerHTML = '<div class="card">❌ Yuklab bo\'lmadi</div>';
        }
    }

    loadAllData();
</script>
</body>
</html>
